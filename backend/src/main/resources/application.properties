# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# DATABASE
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_relief_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================
# JWT
# =============================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =============================================
# RAZORPAY
# =============================================
razorpay.key.id=rzp_test_Sfd1bzmW0GaTIP
razorpay.key.secret=Ma1HkwN2ZIq1kDuLLV8tR083
razorpay.webhook.secret=mySuperSecretKey123
razorpay.currency=INR

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500,http://localhost:5500

# =============================================
# LOGGING
# =============================================
logging.level.com.disasterrelief=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================
# MULTIPART
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
