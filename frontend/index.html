<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Disaster Relief Platform</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    .auth-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,.5); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-circle { width: 64px; height: 64px; background: #dc2626; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 12px; }
    .auth-logo h1 { font-size: 22px; font-weight: 800; color: #1e293b; }
    .auth-logo p { color: #64748b; font-size: 14px; }
    .hidden { display: none; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
    .auth-footer a { color: #dc2626; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">🚨</div>
      <h1>Disaster Relief Platform</h1>
      <p>Coordinate relief operations efficiently</p>
    </div>

    <div id="login-error" class="alert alert-danger hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="usernameOrEmail">Username or Email</label>
        <input class="form-control" type="text" id="usernameOrEmail" name="usernameOrEmail" placeholder="admin or admin@disasterrelief.org" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding: 12px; font-size: 16px; margin-top: 8px;">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>

    <div style="margin-top: 24px; padding: 12px; background: #f8fafc; border-radius: 8px; font-size: 12px; color: #64748b;">
      <strong>Demo credentials:</strong><br>
      Admin: <code>admin / password123</code><br>
      Coordinator: <code>coordinator1 / password123</code><br>
      Volunteer: <code>volunteer1 / password123</code>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
