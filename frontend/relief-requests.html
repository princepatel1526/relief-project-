<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relief Requests | Disaster Relief Platform</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><div class="logo-icon">🚨</div><div><h1>Relief Platform</h1></div></div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Overview</div>
          <a href="admin-dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
          <a href="analytics.html" class="nav-link"><span class="icon">📈</span> Analytics</a>
          <a href="map.html" class="nav-link"><span class="icon">🗺️</span> Live Map</a>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Operations</div>
          <a href="incident-report.html" class="nav-link"><span class="icon">📝</span> Report Incident</a>
          <a href="disasters.html" class="nav-link"><span class="icon">🌪️</span> Disasters</a>
          <a href="relief-requests.html" class="nav-link active"><span class="icon">🆘</span> Relief Requests</a>
          <a href="assignments.html" class="nav-link"><span class="icon">👥</span> Assignments</a>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Resources</div>
          <a href="inventory.html" class="nav-link"><span class="icon">📦</span> Inventory</a>
          <a href="volunteers.html" class="nav-link"><span class="icon">🙋</span> Volunteers</a>
          <a href="donations.html" class="nav-link"><span class="icon">💰</span> Donations</a>
        </div>
      </nav>
      <div class="sidebar-footer"><button onclick="logout()" class="btn btn-outline" style="width:100%;font-size:13px;">🚪 Logout</button></div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h2 class="topbar-title">Relief Requests</h2>
        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ New Request</button>
          <div class="user-menu"><div class="user-avatar" id="user-avatar">A</div><div><div class="user-name" id="user-name"></div></div></div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header" style="margin-bottom:16px">
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <select class="form-control" id="filter-status" style="width:160px">
              <option value="">All Statuses</option>
              <option value="PENDING" selected>Pending</option>
              <option value="SUBMITTED">Submitted</option>
              <option value="PENDING_VERIFICATION">Pending Verification</option>
              <option value="VERIFIED">Verified</option>
              <option value="ASSIGNED">Assigned</option>
              <option value="EN_ROUTE">En Route</option>
              <option value="IN_PROGRESS">In Progress</option>
              <option value="FULFILLED">Fulfilled</option>
              <option value="REJECTED">Rejected</option>
              <option value="CANCELLED">Cancelled</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="loadPriority()">🔝 By Priority</button>
            <button class="btn btn-outline btn-sm" onclick="loadRequests()">All</button>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Victim</th><th>Disaster</th><th>Type</th><th>Urgency</th>
                    <th>Priority</th><th>Status</th><th>Assigned To</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody id="requests-tbody">
                  <tr><td colspan="8" style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></td></tr>
                </tbody>
              </table>
            </div>
            <div id="requests-pagination" class="pagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add Request Modal -->
  <div class="modal-overlay hidden" id="add-modal">
    <div class="modal">
      <div class="modal-header"><h3>🆘 New Relief Request</h3><button class="btn-close" onclick="closeAddModal()">✕</button></div>
      <div class="modal-body">
        <form id="request-form">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Victim ID *</label>
              <input class="form-control" name="victimId" type="number" placeholder="Victim ID" required>
            </div>
            <div class="form-group">
              <label class="form-label">Disaster *</label>
              <select class="form-control" name="disasterId" id="req-disaster-sel" required></select>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Request Type *</label>
              <select class="form-control" name="requestType" required>
                <option value="FOOD">Food</option>
                <option value="WATER">Water</option>
                <option value="MEDICAL">Medical</option>
                <option value="SHELTER">Shelter</option>
                <option value="CLOTHING">Clothing</option>
                <option value="RESCUE">Rescue</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Urgency (1-5) *</label>
              <input class="form-control" name="urgencyLevel" type="number" min="1" max="5" value="3" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="3" placeholder="Describe the need..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity Needed</label>
            <input class="form-control" name="quantityNeeded" type="number" min="1" placeholder="e.g. 5 bags of rice">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeAddModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitRequest()">Submit Request</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import api from './js/api.js';
    import { requireAuth, renderUserInfo, logout as authLogout } from './js/auth.js';
    import { showToast, statusBadge, urgencyBar, buildPagination } from './js/utils.js';
    import './js/profile.js';

    window.logout = authLogout;
    requireAuth();
    renderUserInfo();

    let currentPage = 0;

    async function loadRequests(page = 0) {
      currentPage = page;
      const status = document.getElementById('filter-status').value || null;
      const tbody  = document.getElementById('requests-tbody');
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></td></tr>`;

      try {
        const data = await api.requests.list({ status, page, size: 20 });
        render(data.content, data.totalPages, page);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="alert alert-danger">${e.message}</div></td></tr>`;
      }
    }
    window.loadRequests = loadRequests;

    async function loadPriority() {
      const tbody = document.getElementById('requests-tbody');
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></td></tr>`;
      try {
        const reqs = await api.requests.priority(50);
        render(reqs, 1, 0);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="alert alert-danger">${e.message}</div></td></tr>`;
      }
    }
    window.loadPriority = loadPriority;

    function render(content, totalPages, page) {
      const tbody = document.getElementById('requests-tbody');
      if (!content?.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">✅</div><h3>No requests found</h3></div></td></tr>`;
        return;
      }
      tbody.innerHTML = content.map(r => `
        <tr>
          <td><strong>${r.victimName}</strong><br><small style="color:var(--text-muted)">${r.victimPhone || ''}</small></td>
          <td><small>${r.disasterTitle}</small></td>
          <td><span class="badge badge-info">${r.requestType}</span></td>
          <td>${urgencyBar(r.urgencyLevel)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px;">
              <div style="
                width:36px;height:36px;border-radius:50%;
                background:${priorityColor(r.priorityScore)};
                color:#fff;font-weight:800;font-size:12px;
                display:flex;align-items:center;justify-content:center;
                flex-shrink:0;
              ">${r.priorityScore ?? '—'}</div>
            </div>
          </td>
          <td>${statusBadge(r.status)}</td>
          <td>${r.assignedVolunteerName || '<span style="color:var(--text-muted)">Unassigned</span>'}</td>
          <td style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <select class="form-control" style="font-size:12px;padding:4px 8px;width:auto" onchange="updateStatus(${r.id}, this.value)">
              <option value="">Change status</option>
              <option value="PENDING_VERIFICATION">Pending Verification</option>
              <option value="VERIFIED">Verified</option>
              <option value="ASSIGNED">Assigned</option>
              <option value="EN_ROUTE">En Route</option>
              <option value="IN_PROGRESS">In Progress</option>
              <option value="FULFILLED">Fulfilled</option>
              <option value="REJECTED">Rejected</option>
              <option value="CANCELLED">Cancelled</option>
            </select>
            <button class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 8px;" onclick="showTimeline(${r.id})">📋</button>
          </td>
        </tr>`).join('');

      buildPagination(document.getElementById('requests-pagination'), page, totalPages, loadRequests);
    }

    window.updateStatus = async (id, status) => {
      if (!status) return;
      try {
        await api.requests.setStatus(id, status);
        showToast('Status updated!', 'success');
        loadRequests(currentPage);
      } catch (e) {
        showToast(e.message, 'error');
      }
    };

    window.openAddModal  = async () => {
      const sel = document.getElementById('req-disaster-sel');
      if (!sel.children.length) {
        const { content } = await api.disasters.list({ status: 'ACTIVE', size: 20 });
        content?.forEach(d => sel.appendChild(new Option(d.title, d.id)));
      }
      document.getElementById('add-modal').classList.remove('hidden');
    };
    window.closeAddModal = () => document.getElementById('add-modal').classList.add('hidden');

    window.submitRequest = async () => {
      const form = document.getElementById('request-form');
      const data = Object.fromEntries(new FormData(form));
      data.victimId      = parseInt(data.victimId);
      data.disasterId    = parseInt(data.disasterId);
      data.urgencyLevel  = parseInt(data.urgencyLevel);
      data.quantityNeeded = data.quantityNeeded ? parseInt(data.quantityNeeded) : null;
      try {
        await api.requests.create(data);
        showToast('Request submitted!', 'success');
        window.closeAddModal();
        form.reset();
        loadRequests();
      } catch (e) {
        showToast(e.message, 'error');
      }
    };

    function priorityColor(score) {
      if (!score && score !== 0) return '#8a8784';
      if (score >= 70) return '#a8281a';
      if (score >= 40) return '#8a5a00';
      return '#2c4a2c';
    }
    window.priorityColor = priorityColor;

    window.showTimeline = async (id) => {
      let modal = document.getElementById('timeline-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'timeline-modal';
        modal.className = 'modal-overlay';
        modal.innerHTML = `
          <div class="modal" style="max-width:500px">
            <div class="modal-header">
              <h3>📋 Status Timeline</h3>
              <button class="btn-close" onclick="document.getElementById('timeline-modal').classList.add('hidden')">✕</button>
            </div>
            <div class="modal-body" id="timeline-body" style="max-height:400px;overflow-y:auto;">
              <div class="loading-overlay"><div class="spinner"></div></div>
            </div>
          </div>`;
        document.body.appendChild(modal);
      }
      modal.classList.remove('hidden');
      const body = document.getElementById('timeline-body');
      body.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
      try {
        const history = await api.requests.timeline(id);
        if (!history.length) {
          body.innerHTML = '<p style="color:var(--text-muted);padding:16px;font-size:13px;">No status history yet.</p>';
          return;
        }
        body.innerHTML = `<div style="padding:4px 0;">` +
          history.map((h, i) => `
            <div style="display:flex;gap:12px;margin-bottom:${i < history.length-1 ? '0' : '0'};">
              <div style="display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0;">
                <div style="width:10px;height:10px;border-radius:50%;background:var(--primary);margin-top:4px;flex-shrink:0;"></div>
                ${i < history.length-1 ? '<div style="width:2px;flex:1;background:var(--border);margin:2px 0;min-height:20px;"></div>' : ''}
              </div>
              <div style="padding-bottom:16px;flex:1;">
                <div style="font-size:13px;font-weight:700;color:var(--text);">
                  ${h.fromStatus ? h.fromStatus + ' → ' : ''}${h.toStatus}
                </div>
                <div style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">
                  ${h.changedBy ? 'By ' + h.changedBy + ' · ' : ''}${new Date(h.createdAt).toLocaleString()}
                </div>
                ${h.comment ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;font-style:italic;">"${h.comment}"</div>` : ''}
              </div>
            </div>`).join('') +
          `</div>`;
      } catch (e) {
        body.innerHTML = `<p style="color:var(--danger);padding:16px;font-size:13px;">${e.message}</p>`;
      }
    };

    document.getElementById('filter-status').onchange = () => loadRequests(0);
    loadRequests();
  </script>
</body>
</html>
